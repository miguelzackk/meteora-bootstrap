<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histórico de Compras</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
</head>
<body style="font-family: 'Inter', sans-serif">
    <header class="bg-black d-flex w-100 align-items-center" style="height: 58px; padding: 0 23px">
        <!-- Header igual às outras páginas -->
    </header>

    <section class="container my-5">
        <h1 class="text-center mb-5">Histórico de Compras</h1>
        
        <div id="historico-vazio" class="text-center">
            <h3 class="text-muted">Nenhum pedido encontrado</h3>
            <p>Seus pedidos aparecerão aqui</p>
            <a href="index.html" class="btn" style="background-color: blueviolet; color: white;">Fazer Compras</a>
        </div>
        
        <div id="historico-pedidos" style="display: none;">
            <!-- Pedidos serão carregados aqui -->
        </div>
    </section>

    <script>
        function carregarHistorico() {
            const usuario = authManager.usuarioLogado;
            
            if (!usuario) {
                alert('Faça login para ver seu histórico!');
                window.location.href = 'index.html';
                return;
            }
            
            // Aqui você pode implementar a busca do histórico no banco
            // Por enquanto, mostra mensagem de vazio
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            carregarHistorico();
        });
    </script>
    <script src="/src/scripts/auth.js"></script>
</body>
</html>
