<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histórico de Compras</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body style="font-family: 'Inter', sans-serif">
    <header
      class="bg-black d-flex w-100 align-items-center"
      style="height: 58px; padding: 0 23px"
    ></header>

    <section class="container my-5">
      <h1 class="text-center mb-5">Histórico de Compras</h1>

      <div id="historico-vazio" class="text-center">
        <h3 class="text-muted">Nenhum pedido encontrado</h3>
        <p>Seus pedidos aparecerão aqui</p>
        <a
          href="index.html"
          class="btn"
          style="background-color: blueviolet; color: white"
          >Fazer Compras</a
        >
      </div>

      <div id="historico-pedidos" style="display: none"></div>
    </section>

    <script src="/src/scripts/auth.js"></script>

    <script>
      async function carregarHistorico() {
        const usuario = authManager.usuarioLogado;

        if (!usuario) {
          alert("Faça login para ver seu histórico!");
          window.location.href = "index.html";
          return;
        }

        try {
          const resp = await fetch(
            `https://backend-meteora-production.up.railway.app/listar-historico.php?id_cliente=${usuario.id_cliente}`
          );
          const data = await resp.json();

          const container = document.getElementById("historico-pedidos");
          const vazio = document.getElementById("historico-vazio");

          if (!data.success || !data.historico || data.historico.length === 0) {
            vazio.style.display = "block";
            container.style.display = "none";
            return;
          }

          vazio.style.display = "none";
          container.style.display = "block";
          container.innerHTML = "";

          data.historico.forEach((pedido) => {
            const total = parseFloat(pedido.valor_total || 0);

            const pedidoEl = document.createElement("div");
            pedidoEl.className = "card mb-4 shadow-sm";
            pedidoEl.innerHTML = `
              <div class="card-body">
                  <h5 class="card-title">Pedido #${pedido.id_compra}</h5>
                  <p class="text-muted mb-2">
                      Data: ${new Date(pedido.data_compra).toLocaleString(
                        "pt-BR"
                      )}
                  </p>
                  <p><strong>Total:</strong> R$ ${total
                    .toFixed(2)
                    .replace(".", ",")}</p>

                  <hr>
                  ${pedido.itens
                    .map(
                      (item) => `
                      <div class="d-flex align-items-center mb-2">
                          <img src="${
                            item.imagem || "https://picsum.photos/80"
                          }" 
                               class="rounded me-3" width="60" height="60"
                               style="object-fit: cover;">
                          <div>
                              <p class="mb-0"><strong>${
                                item.nome_produto
                              }</strong></p>
                              <small>Qtd: ${item.quantidade}</small><br>
                              <small>Preço: R$ ${parseFloat(
                                item.valor_unitario || 0
                              )
                                .toFixed(2)
                                .replace(".", ",")}</small>
                          </div>
                      </div>
                  `
                    )
                    .join("")}
              </div>
            `;
            container.appendChild(pedidoEl);
          });
        } catch (err) {
          console.error("Erro ao carregar histórico:", err);
          alert("Erro ao carregar histórico de compras.");
        }
      }

      document.addEventListener("DOMContentLoaded", carregarHistorico);
    </script>
  </body>
</html>
