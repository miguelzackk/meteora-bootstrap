<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resultados da Busca</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
</head>
<body style="font-family: 'Inter', sans-serif">
    <header class="bg-black d-flex w-100 align-items-center" style="height: 58px; padding: 0 23px">
        <!-- Header igual às outras páginas -->
    </header>

    <section class="container my-5">
        <h1 id="titulo-busca" class="text-center mb-5">Resultados da Busca</h1>
        
        <div class="row g-4" id="resultados-busca">
            <div class="col-12 text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Buscando produtos...</span>
                </div>
                <p class="mt-2">Buscando produtos...</p>
            </div>
        </div>
    </section>

    <script>
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                q: params.get('q')
            };
        }

        async function carregarBusca() {
            try {
                const { q } = getUrlParams();
                
                if (!q) {
                    window.location.href = 'index.html';
                    return;
                }

                document.getElementById('titulo-busca').textContent = `Resultados para: "${q}"`;

                const response = await fetch(`http://localhost:8000/api/busca.php?q=${encodeURIComponent(q)}`);
                
                if (!response.ok) {
                    throw new Error('API não respondeu');
                }
                
                const data = await response.json();
                
                const container = document.getElementById("resultados-busca");
                
                if (data.error || !Array.isArray(data)) {
                    container.innerHTML = '<div class="col-12 text-center text-danger">Erro na busca</div>';
                    return;
                }

                if (data.length === 0) {
                    container.innerHTML = `
                        <div class="col-12 text-center">
                            <h3 class="text-muted">Nenhum produto encontrado</h3>
                            <p>Tente outros termos de busca</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = '';
                
                data.forEach(produto => {
                    const col = document.createElement("div");
                    col.className = "col-md-4 mb-4";

                    col.innerHTML = `
                        <div class="card h-100 border-0 shadow-sm">
                            <img 
                                src="${produto.imagem}" 
                                class="card-img-top" 
                                alt="${produto.nome}"
                                style="height: 300px; object-fit: cover;"
                                onerror="this.src='https://picsum.photos/400/300?random=${produto.id_produto}'"
                            >
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title fw-bold">${produto.nome}</h5>
                                <p class="card-text text-muted flex-grow-1">
                                    ${produto.descricao || "Produto de alta qualidade."}
                                </p>
                                <div class="mt-auto">
                                    <p class="card-text fw-bold text-primary fs-5">
                                        R$ ${parseFloat(produto.preco).toFixed(2).replace(".", ",")}
                                    </p>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="badge bg-secondary">${produto.categoria}</span>
                                        <span class="badge bg-${produto.estoque > 0 ? "success" : "danger"}">
                                            ${produto.estoque} em estoque
                                        </span>
                                    </div>
                                    <button class="btn w-100 mt-2" style="background-color: blueviolet; border: none; color: white;" 
                                            onclick="window.location.href='produto.html?id=${produto.id_produto}'">
                                        Ver Detalhes
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;

                    container.appendChild(col);
                });

            } catch (error) {
                console.error("Erro na busca:", error);
                document.getElementById('resultados-busca').innerHTML = 
                    '<div class="col-12 text-center text-danger">Erro na busca</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            carregarBusca();
        });
    </script>
    <script src="/src/scripts/auth.js"></script>
</body>
</html>
