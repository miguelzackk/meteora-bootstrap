<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalhes do Produto</title>
    <link rel="stylesheet" href="/src/styles/reset.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="font-family: 'Inter', sans-serif">
    <header
      class="bg-black d-flex w-100 align-items-center"
      style="height: 58px; padding: 0 23px"
    >
      <nav
        class="navbar navbar-expand-lg bg-black"
        style="
          padding: 0;
          display: flex;
          justify-content: space-between;
          width: 100%;
        "
      >
        <div
          class="container-fluid d-flex justify-content-between w-100"
          style="padding: 0"
        >
          <div class="d-flex flex-row align-items-center" style="gap: 40px">
            <a
              class="navbar-brand"
              href="index.html"
              style="margin-right: 0; padding: 0"
            >
              <img
                src="/src/assets/images/logo-desktop.webp"
                alt="Logo Meteora"
              />
            </a>
            <div class="collapse navbar-collapse d-flex" id="navbarNav">
              <ul
                class="navbar-nav d-flex align-items-center"
                style="gap: 40px"
              >
                <li class="nav-item">
                  <a
                    class="nav-link active"
                    href="index.html"
                    style="
                      color: white !important;
                      font-weight: bold;
                      padding: 0;
                    "
                    >Home</a
                  >
                </li>
              </ul>
            </div>
          </div>
          <div class="d-flex align-items-center" style="gap: 20px">
            <form class="d-flex align-items-center" id="searchForm">
              <input
                class="form-control me-2 fw-normal"
                type="search"
                placeholder="Digite o Produto"
                aria-label="Search"
                style="
                  padding: 0 0 0 15px;
                  font-size: 15px;
                  height: 38px;
                  width: 207px;
                  border-radius: 0;
                "
              />
              <button
                class="btn btn-outline-light"
                style="
                  padding: 9px 12px;
                  width: 80px;
                  height: 37px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  border-radius: 0;
                "
                type="submit"
              >
                Buscar
              </button>
            </form>

            <a
              href="carrinho.html"
              class="text-white text-decoration-none position-relative"
            >
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"
                ></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
              </svg>
              <span
                id="carrinho-count"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                style="display: none"
                >0</span
              >
            </a>

            <div id="auth-buttons">
              <button
                class="btn btn-outline-light"
                onclick="abrirModalLogin()"
                style="border-radius: 0"
              >
                Login
              </button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <section class="container my-5">
      <div class="row" id="produto-container">
        <div class="col-12 text-center">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Carregando produto...</span>
          </div>
          <p class="mt-2">Carregando produto...</p>
        </div>
      </div>
    </section>

    <footer
      class="bg-black d-flex justify-content-center align-items-center mt-5"
      style="padding: 17px"
    >
      <p class="fw-normal text-white" style="font-size: 13px; margin: 0">
        2023 | Projeto fictício sem fins comerciais.
      </p>
    </footer>

    <div class="modal fade" id="modalLogin" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Login</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="formLogin">
              <div class="mb-3">
                <label for="loginEmail" class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  id="loginEmail"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="loginSenha" class="form-label">Senha</label>
                <input
                  type="password"
                  class="form-control"
                  id="loginSenha"
                  required
                />
              </div>
              <button
                type="submit"
                class="btn w-100"
                style="background-color: blueviolet; color: white"
              >
                Entrar
              </button>
            </form>
            <div class="text-center mt-3">
              <a href="#" onclick="mostrarCadastro()"
                >Não tem conta? Cadastre-se</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalCadastro" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Criar Conta</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="formCadastro">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="cadastroNome" class="form-label">Nome</label>
                  <input
                    type="text"
                    class="form-control"
                    id="cadastroNome"
                    required
                  />
                </div>
                <div class="col-md-6 mb-3">
                  <label for="cadastroSobrenome" class="form-label"
                    >Sobrenome</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="cadastroSobrenome"
                    required
                  />
                </div>
              </div>
              <div class="mb-3">
                <label for="cadastroEmail" class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  id="cadastroEmail"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="cadastroSenha" class="form-label">Senha</label>
                <input
                  type="password"
                  class="form-control"
                  id="cadastroSenha"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="cadastroConfirmarSenha" class="form-label"
                  >Confirmar Senha</label
                >
                <input
                  type="password"
                  class="form-control"
                  id="cadastroConfirmarSenha"
                  required
                />
              </div>
              <button
                type="submit"
                class="btn w-100"
                style="background-color: blueviolet; color: white"
              >
                Criar Conta
              </button>
            </form>
            <div class="text-center mt-3">
              <a href="#" onclick="mostrarLogin()">Já tem conta? Faça login</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
      crossorigin="anonymous"
    ></script>

    <script>
      function abrirModalLogin() {
        const modalCadastro = bootstrap.Modal.getInstance(
          document.getElementById("modalCadastro")
        );
        if (modalCadastro) {
          modalCadastro.hide();
        }

        const modalLogin = new bootstrap.Modal(
          document.getElementById("modalLogin")
        );
        modalLogin.show();
      }

      function abrirModalCadastro() {
        const modalLogin = bootstrap.Modal.getInstance(
          document.getElementById("modalLogin")
        );
        if (modalLogin) {
          modalLogin.hide();
        }

        const modalCadastro = new bootstrap.Modal(
          document.getElementById("modalCadastro")
        );
        modalCadastro.show();
      }

      function mostrarCadastro() {
        abrirModalCadastro();
      }

      function mostrarLogin() {
        abrirModalLogin();
      }

      function getUrlParams() {
        const params = new URLSearchParams(window.location.search);
        return {
          id: params.get("id"),
        };
      }

      async function carregarProduto() {
        try {
          const { id } = getUrlParams();

          if (!id) {
            document.getElementById("produto-container").innerHTML =
              '<div class="col-12 text-center text-danger">Produto não especificado</div>';
            return;
          }

          const response = await fetch(
            `https://backend-meteora-production.up.railway.app/produto.php?id=${id}`
          );

          if (!response.ok) {
            throw new Error("API não respondeu");
          }

          const data = await response.json();

          const container = document.getElementById("produto-container");

          if (data.error || !data.id_produto) {
            container.innerHTML =
              '<div class="col-12 text-center text-danger">Produto não encontrado</div>';
            return;
          }

          const produto = data;

          // Verificar se há estoque
          const temEstoque = produto.estoque > 0;

          container.innerHTML = `
                    <div class="col-md-6">
                        <img src="${
                          produto.imagem
                        }" class="img-fluid w-100" alt="${produto.nome}" 
                             style="max-height: 600px; object-fit: cover;"
                             onerror="this.src='https://picsum.photos/600/600?random=${
                               produto.id_produto
                             }'">
                    </div>
                    <div class="col-md-6">
                        <h1 class="fw-bold">${produto.nome}</h1>
                        <p class="text-muted fs-5">${produto.categoria}</p>
                        <p class="fw-bold text-primary fs-2">R$ ${parseFloat(
                          produto.preco
                        )
                          .toFixed(2)
                          .replace(".", ",")}</p>
                        
                        <div class="mb-4">
                            <p>${
                              produto.descricao || "Produto de alta qualidade."
                            }</p>
                        </div>
                        
                        <div class="d-flex align-items-center mb-3">
                            <span class="badge ${
                              produto.estoque > 0 ? "bg-success" : "bg-danger"
                            } me-3">
                                ${produto.estoque} em estoque
                            </span>
                        </div>
                        
                        ${
                          temEstoque
                            ? `
                        <div class="d-flex align-items-center mb-4">
                            <label for="quantidade" class="form-label me-3 mb-0">Quantidade:</label>
                            <input type="number" id="quantidade" class="form-control" style="width: 100px;" 
                                   value="1" min="1" max="${produto.estoque}">
                        </div>
                        
                        <button class="btn w-100 py-3"
                          style="background-color: blueviolet; border: none; color: white; font-size: 1.2rem;"
                          onclick="adicionarProdutoAoCarrinho(${produto.id_produto})">
                          Adicionar ao Carrinho
                        </button>
                        `
                            : `
                        <div class="alert alert-danger" role="alert">
                          <strong>Produto esgotado!</strong> Este produto não está disponível no momento.
                        </div>
                        <button class="btn w-100 py-3"
                          style="background-color: #ccc; border: none; color: #666; font-size: 1.2rem; cursor: not-allowed;"
                          disabled>
                          Produto Esgotado
                        </button>
                        `
                        }
                        
                        <div class="mt-4">
                            <h5>Características:</h5>
                            <ul>
                                <li>Entrega grátis para compras acima de R$ 200</li>
                                <li>Troca em até 30 dias</li>
                                <li>Pagamento via PIX com 5% de desconto</li>
                            </ul>
                        </div>
                    </div>
                `;
        } catch (error) {
          console.error("Erro ao carregar produto:", error);
          document.getElementById("produto-container").innerHTML =
            '<div class="col-12 text-center text-danger">Erro ao carregar produto</div>';
        }
      }

      function adicionarProdutoAoCarrinho(idProduto) {
        if (typeof authManager === "undefined") {
          alert(
            "Sistema de autenticação não carregado. Por favor, recarregue a página."
          );
          return;
        }

        if (!authManager.usuarioLogado) {
          alert(
            "Você precisa criar uma conta ou fazer login para adicionar produtos ao carrinho."
          );
          abrirModalLogin();
          return;
        }

        const quantidade = parseInt(
          document.getElementById("quantidade").value
        );

        // Verificar se a quantidade é válida
        if (quantidade < 1) {
          alert("A quantidade deve ser pelo menos 1.");
          return;
        }

        fetch(
          `https://backend-meteora-production.up.railway.app/produto.php?id=${idProduto}`
        )
          .then((res) => res.json())
          .then((produto) => {
            if (produto.error) {
              alert("Erro ao carregar produto");
              return;
            }

            // Verificar se há estoque suficiente
            if (produto.estoque <= 0) {
              alert("Desculpe, este produto está esgotado.");
              return;
            }

            if (quantidade > produto.estoque) {
              alert(
                `Desculpe, só temos ${produto.estoque} unidades em estoque.`
              );
              return;
            }

            authManager.adicionarAoCarrinho(produto, quantidade);
          })
          .catch((error) => {
            console.error("Erro:", error);
            alert("Erro ao adicionar produto ao carrinho");
          });
      }

      document
        .getElementById("searchForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const termo = this.querySelector("input").value;
          if (termo.trim()) {
            window.location.href = `busca.html?q=${encodeURIComponent(termo)}`;
          }
        });

      document
        .getElementById("formLogin")
        ?.addEventListener("submit", function (e) {
          e.preventDefault();
          const email = document.getElementById("loginEmail").value;
          const senha = document.getElementById("loginSenha").value;

          if (
            typeof authManager !== "undefined" &&
            typeof authManager.login === "function"
          ) {
            authManager
              .login(email, senha)
              .then(() => {
                const modal = bootstrap.Modal.getInstance(
                  document.getElementById("modalLogin")
                );
                if (modal) {
                  modal.hide();
                }
              })
              .catch((error) => {
                alert("Erro no login: " + error.message);
              });
          } else {
            alert("Sistema de autenticação não disponível");
          }
        });

      document
        .getElementById("formCadastro")
        ?.addEventListener("submit", function (e) {
          e.preventDefault();
          const nome = document.getElementById("cadastroNome").value;
          const sobrenome = document.getElementById("cadastroSobrenome").value;
          const email = document.getElementById("cadastroEmail").value;
          const senha = document.getElementById("cadastroSenha").value;
          const confirmarSenha = document.getElementById(
            "cadastroConfirmarSenha"
          ).value;

          if (senha !== confirmarSenha) {
            alert("As senhas não coincidem!");
            return;
          }

          if (
            typeof authManager !== "undefined" &&
            typeof authManager.cadastrar === "function"
          ) {
            authManager
              .cadastrar(email, senha, nome + " " + sobrenome)
              .then(() => {
                const modal = bootstrap.Modal.getInstance(
                  document.getElementById("modalCadastro")
                );
                if (modal) {
                  modal.hide();
                }
              })
              .catch((error) => {
                alert("Erro no cadastro: " + error.message);
              });
          } else {
            alert("Sistema de autenticação não disponível");
          }
        });

      document.addEventListener("DOMContentLoaded", function () {
        carregarProduto();

        const modalLogin = new bootstrap.Modal(
          document.getElementById("modalLogin")
        );
        const modalCadastro = new bootstrap.Modal(
          document.getElementById("modalCadastro")
        );
      });
    </script>
    <script src="/src/scripts/auth.js"></script>
  </body>
</html>
