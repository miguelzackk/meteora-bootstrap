<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Perfil</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- Adicione o script auth.js ANTES do seu script inline -->
    <script src="/src/scripts/auth.js" defer></script>
  </head>
  <body style="font-family: 'Inter', sans-serif">
    <header
      class="bg-black d-flex w-100 align-items-center"
      style="height: 58px; padding: 0 23px"
    >
      <!-- O header será atualizado pelo auth.js -->
    </header>

    <section class="container my-5">
      <h1 class="text-center mb-5">Meu Perfil</h1>

      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card">
            <div class="card-body">
              <form id="formPerfil">
                <div class="mb-3">
                  <label for="perfilNome" class="form-label">Nome</label>
                  <input
                    type="text"
                    class="form-control"
                    id="perfilNome"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="perfilSobrenome" class="form-label"
                    >Sobrenome</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="perfilSobrenome"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="perfilEmail" class="form-label">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="perfilEmail"
                    required
                    readonly
                  />
                </div>
                <div class="mb-3">
                  <label for="perfilSenha" class="form-label"
                    >Nova Senha (deixe em branco para não alterar)</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="perfilSenha"
                  />
                </div>
                <div class="mb-3">
                  <label for="perfilConfirmarSenha" class="form-label"
                    >Confirmar Nova Senha</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="perfilConfirmarSenha"
                  />
                </div>
                <button
                  type="submit"
                  class="btn w-100"
                  style="background-color: blueviolet; color: white"
                >
                  Atualizar Perfil
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Scripts Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    
    <script>
      // Script inline para o perfil
      document.addEventListener('DOMContentLoaded', function() {
        // Verificar se o usuário está autenticado
        if (!authManager || !authManager.usuarioLogado) {
          authManager.mostrarMensagem('Faça login para acessar seu perfil!', 'warning');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
          return;
        }

        // Carregar dados do perfil
        const usuario = authManager.usuarioLogado;
        document.getElementById('perfilNome').value = usuario.nome || '';
        document.getElementById('perfilSobrenome').value = usuario.sobrenome || '';
        document.getElementById('perfilEmail').value = usuario.email || '';

        // Configurar submit do formulário
        const formPerfil = document.getElementById('formPerfil');
        if (formPerfil) {
          formPerfil.addEventListener('submit', function(e) {
            e.preventDefault();

            const nome = document.getElementById('perfilNome').value;
            const sobrenome = document.getElementById('perfilSobrenome').value;
            const senha = document.getElementById('perfilSenha').value;
            const confirmarSenha = document.getElementById('perfilConfirmarSenha').value;

            if (!nome || !sobrenome) {
              authManager.mostrarMensagem('Preencha nome e sobrenome!', 'warning');
              return;
            }

            if (senha && senha !== confirmarSenha) {
              authManager.mostrarMensagem('As senhas não coincidem!', 'warning');
              return;
            }

            const dados = { nome, sobrenome };
            if (senha) {
              dados.senha = senha;
            }

            // Chamar o método atualizarPerfil do authManager
            authManager.atualizarPerfil(dados).then(resultado => {
              if (!resultado.success) {
                authManager.mostrarMensagem(resultado.message, 'danger');
              }
            });
          });
        }
      });
    </script>
  </body>
</html>
