<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produtos por Categoria</title>

    <link rel="stylesheet" href="/src/styles/reset.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="font-family: 'Inter', sans-serif">
    <header
      class="bg-black d-flex w-100 align-items-center"
      style="height: 58px; padding: 0 23px"
    >
      <nav
        class="navbar navbar-expand-lg bg-black"
        style="
          padding: 0;
          display: flex;
          justify-content: space-between;
          width: 100%;
        "
      >
        <div
          class="container-fluid d-flex justify-content-between w-100"
          style="padding: 0"
        >
          <div class="d-flex flex-row align-items-center" style="gap: 40px">
            <a
              class="navbar-brand"
              href="index.html"
              style="margin-right: 0; padding: 0"
            >
              <img
                src="/src/assets/images/logo-desktop.webp"
                alt="Logo Meteora"
              />
            </a>
            <button
              class="navbar-toggler bg-light"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarNav"
              aria-controls="navbarNav"
              aria-expanded="false"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse d-flex" id="navbarNav">
              <ul
                class="navbar-nav d-flex align-items-center"
                style="gap: 40px"
              >
                <li class="nav-item">
                  <a
                    class="nav-link active"
                    href="index.html"
                    style="
                      color: white !important;
                      font-weight: bold;
                      padding: 0;
                    "
                    >Home</a
                  >
                </li>
              </ul>
            </div>
          </div>
          <div class="d-flex align-items-center" style="gap: 20px">
            <form class="d-flex align-items-center">
              <input
                class="form-control me-2 fw-normal"
                type="search"
                placeholder="Digite o Produto"
                aria-label="Search"
                style="
                  padding: 0 0 0 15px;
                  font-size: 15px;
                  height: 38px;
                  width: 207px;
                  border-radius: 0;
                "
              />
              <button
                class="btn btn-outline-light"
                style="
                  padding: 9px 12px;
                  width: 80px;
                  height: 37px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  border-radius: 0;
                "
                type="submit"
              >
                Buscar
              </button>
            </form>

            <a
              href="carrinho.html"
              class="text-white text-decoration-none position-relative"
            >
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"
                ></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
              </svg>
              <span
                id="carrinho-count"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                style="display: none"
                >0</span
              >
            </a>

            <div id="auth-buttons">
              <button
                class="btn btn-outline-light"
                onclick="abrirModalLogin()"
                style="border-radius: 0"
              >
                Login
              </button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <section class="container mt-4">
      <div class="row">
        <div class="col-12">
          <h1 id="titulo-categoria" class="fw-medium text-center">
            Carregando...
          </h1>
          <div class="row g-4 mt-3" id="produtos-categoria">
            <div class="col-12 text-center">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Carregando produtos...</span>
              </div>
              <p class="mt-2">Carregando produtos da categoria...</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer
      class="bg-black d-flex justify-content-center align-items-center mt-5"
      style="padding: 17px"
    >
      <p class="fw-normal text-white" style="font-size: 13px; margin: 0">
        2023 | Projeto fictício sem fins comerciais.
      </p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
      crossorigin="anonymous"
    ></script>

    <script>
      function getUrlParams() {
        const params = new URLSearchParams(window.location.search);
        return {
          categoria: params.get("categoria"),
        };
      }

      async function carregarProdutosCategoria() {
        try {
          const { categoria } = getUrlParams();

          if (!categoria) {
            document.getElementById("titulo-categoria").textContent =
              "Categoria não especificada";
            return;
          }

          const categoriaDecodificada = decodeURIComponent(categoria);
          document.getElementById(
            "titulo-categoria"
          ).textContent = `Produtos: ${categoriaDecodificada}`;

          console.log(
            "Carregando produtos para categoria:",
            categoriaDecodificada
          );

          const response = await fetch(
            `https://backend-meteora-production.up.railway.app/produtos-categoria.php?categoria=${categoria}`
          );

          if (!response.ok) {
            throw new Error(`API não respondeu: ${response.status}`);
          }

          const data = await response.json();
          console.log("Dados recebidos:", data);

          const containerProdutos =
            document.getElementById("produtos-categoria");
          containerProdutos.innerHTML = "";

          if (data.error) {
            containerProdutos.innerHTML =
              '<div class="col-12 text-center text-danger"><p>Erro: ' +
              data.error +
              "</p></div>";
            return;
          }

          if (data.warning) {
            containerProdutos.innerHTML =
              '<div class="col-12 text-center text-muted"><p>' +
              data.warning +
              "</p></div>";
            return;
          }

          if (!Array.isArray(data)) {
            console.error("Dados não são array:", data);
            containerProdutos.innerHTML =
              '<div class="col-12 text-center text-danger"><p>Dados inválidos recebidos</p></div>';
            return;
          }

          if (data.length === 0) {
            containerProdutos.innerHTML =
              '<div class="col-12 text-center text-muted"><p>Nenhum produto encontrado nesta categoria</p></div>';
            return;
          }

          data.forEach((produto) => {
            const col = document.createElement("div");
            col.className = "col-md-4 mb-4";

            col.innerHTML = `
                <div class="card h-100 border-0 shadow-sm">
                    <img 
                        src="${produto.imagem}" 
                        class="card-img-top" 
                        alt="${produto.nome}"
                        style="height: 300px; object-fit: cover;"
                        onerror="this.src='https://picsum.photos/400/300?random=${
                          produto.id_produto
                        }'"
                    >
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold">${produto.nome}</h5>
                        <p class="card-text text-muted flex-grow-1">
                            ${produto.descricao || "Produto de alta qualidade."}
                        </p>
                        <div class="mt-auto">
                            <p class="card-text fw-bold text-primary fs-5">
                                R$ ${parseFloat(produto.preco)
                                  .toFixed(2)
                                  .replace(".", ",")}
                            </p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="badge bg-secondary">${
                                  produto.categoria
                                }</span>
                                <span class="badge ${
                                  produto.estoque > 0
                                    ? "bg-success"
                                    : "bg-danger"
                                }">
                                    ${produto.estoque} em estoque
                                </span>
                            </div>
                            <button class="btn w-100 mt-2" 
                                    style="background-color: blueviolet; border: none; color: white;" 
                                    onclick="window.location.href='produto.html?id=${
                                      produto.id_produto
                                    }'">
                                Ver Detalhes
                            </button>
                        </div>
                    </div>
                </div>
            `;

            containerProdutos.appendChild(col);
          });
        } catch (error) {
          console.error("Erro ao carregar produtos da categoria:", error);
          document.getElementById("produtos-categoria").innerHTML =
            '<div class="col-12 text-center text-danger"><p>Erro ao carregar produtos: ' +
            error.message +
            "</p></div>";
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        carregarProdutosCategoria();
      });
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var dropdowns = document.querySelectorAll(".dropdown-toggle");
        dropdowns.forEach(function (dropdown) {
          new bootstrap.Dropdown(dropdown);
        });

        if (typeof authManager !== "undefined") {
          authManager.atualizarHeader();
        }
      });
    </script>

    <script src="/src/scripts/auth.js"></script>
  </body>
</html>
